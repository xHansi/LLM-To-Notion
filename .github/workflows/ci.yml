name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build-prod

      - name: Run tests
        run: npm test

      - name: Create ZIP for Chrome Web Store (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          rm -f extension.zip
          zip -r extension.zip extension

      - name: Upload ZIP artifact (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: extension.zip

